<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
<div class="col-md-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">Вход в систему</div>
        <div class="card-body">
            <form method="post" action="/login">
                <div class="form-group">
                    <label for="j_username">Логин</label>
                    <input type="text" class="form-control" id="j_username" name="j_username" required>
                </div>
                <div class="form-group">
                    <label for="j_password">Пароль</label>
                    <input type="password" class="form-control" id="j_password" name="j_password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
</body>
</html>
